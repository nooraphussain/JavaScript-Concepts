<!-- - toggle checkbox by button click -->

<input type="checkbox" id="myCheckbox">
<button id="toggleBtn">Toggle Checkbox</button>

<script>
    const checkbox = document.getElementById('myCheckbox');
    const button = document.getElementById('toggleBtn');

    button.addEventListener("click" , () => {
        checkbox.checked = !checkbox.checked;
    });

</script>

<!-- - prevent right click of a button -->
<button id="rightClick">Right Click me</button>
<script>
    const btn = document.getElementById('rightClick');
    btn.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        alert('Right click disabled on this button!')
    })
</script>
